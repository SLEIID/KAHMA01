services:
  kahma-db:
    image: postgres:16-alpine
    container_name: kahma-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - kahma_db_data:/var/lib/postgresql/data
    networks:
      - kahma_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  kahma-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kahma-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@kahma-db:5432/${POSTGRES_DB}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRES: ${JWT_ACCESS_EXPIRES:-15m}
      JWT_REFRESH_EXPIRES: ${JWT_REFRESH_EXPIRES:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN}
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-12}
    depends_on:
      kahma-db:
        condition: service_healthy
    volumes:
      - kahma_uploads:/app/uploads
    networks:
      - kahma_net
    ports:
      - "3301:3001"

  kahma-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kahma-frontend
    restart: unless-stopped
    networks:
      - kahma_net
    ports:
      - "3300:80"

  kahma-nginx:
    image: nginx:alpine
    container_name: kahma-nginx
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - kahma-backend
      - kahma-frontend
    networks:
      - kahma_net
    ports:
      - "8090:80"

networks:
  kahma_net:
    driver: bridge

volumes:
  kahma_db_data:
  kahma_uploads:
